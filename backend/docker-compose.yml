# Xboard 后端服务部署配置
# 包含完整源代码，可直接构建运行
version: '3.8'

services:
  xboard:
    build:
      context: ./src
      dockerfile: Dockerfile
    image: uuvpn/xboard:latest
    restart: unless-stopped
    ports:
      - "7001:7001"
    volumes:
      - ./.env:/www/.env
      - ./data/database:/www/.docker/.data
      - ./data/logs:/www/storage/logs
      - ./data/theme:/www/storage/theme
      - ./data/plugins:/www/plugins
      - redis-data:/data
    environment:
      - RESOURCE_PROFILE=balanced
      - ENABLE_HORIZON=true
      - docker=true
    networks:
      - xboard-network

  # 可选：使用 MySQL 数据库
  # db:
  #   image: mysql:8.0
  #   restart: unless-stopped
  #   environment:
  #     MYSQL_ROOT_PASSWORD: your_password
  #     MYSQL_DATABASE: xboard
  #   volumes:
  #     - mysql-data:/var/lib/mysql
  #   networks:
  #     - xboard-network

  # 可选：使用 Nginx 反向代理
  # nginx:
  #   image: nginx:alpine
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf
  #     - ./ssl:/etc/nginx/ssl
  #   depends_on:
  #     - xboard
  #   networks:
  #     - xboard-network

volumes:
  redis-data:
  # mysql-data:  # 如果使用 MySQL

networks:
  xboard-network:
    driver: bridge
